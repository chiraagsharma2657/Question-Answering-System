<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
      integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Segoe+UI&display=swap"
      rel="stylesheet"
    />
    <link href="../static/styles.css" rel="stylesheet" />

    <title>Question Answering System</title>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark navbar-expand-sm fixed-top">
      <div class="container">
        <a class="navbar-brand" href="#">QA System</a>
        <button
          class="navbar-toggler"
          type="button"
          data-toggle="collapse"
          data-target="#Navbar"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="Navbar">
          <ul class="navbar-nav ml-auto">
            <li class="nav-item active">
              <a class="nav-link" href="/">Home</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Hero -->
    <header class="jumbotron" style="margin-top: 56px;">
      <div class="container">
        <h2>Get Instant Answers from Any Text</h2>
        <p>Paste a paragraph or upload a PDF, ask a question, and let AI find the answer for you.</p>
      </div>
    </header>

    <!-- Main Content -->
    <div class="container main-container">
      <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3" id="sidecol">
          <label for="modelchoice">Model</label>
          <select class="form-control" id="modelchoice" onChange="cond(this)">
            <option value="model1">BERT Large</option>
            <option value="model2">BERT Base</option>
          </select>

          <div style="padding-top: 24px;">
            <label for="uploadchoice">Input Method</label>
            <select class="form-control" id="uploadchoice" onChange="checkOption(this)">
              <option value="copy">Copy Paste Text</option>
              <option value="upload">Upload PDF</option>
            </select>
          </div>

          <div style="padding-top: 20px;">
            <form method="post" action="/upload" enctype="multipart/form-data">
              <input type="file" name="file" id="file_upload" style="display: none;" accept=".pdf"/>
              <input type="submit" id="submit_btn" value="Upload" style="display: none;"/>
            </form>
          </div>
        </div>

        <!-- Form -->
        <div class="col-md-9">
          <div class="form-card">
            <form id="formId" method="POST" action="/model1">
              <div class="form-group">
                <label for="para">Enter your Comprehension</label>
                <textarea
                  class="form-control"
                  id="para"
                  name="para"
                  rows="10"
                  placeholder="Paste your paragraph or passage here..."
                >{{para}}</textarea>
              </div>

              <div class="form-group">
                <label for="ques">Ask a Question</label>
                <input
                  type="text"
                  class="form-control"
                  id="ques"
                  name="ques"
                  placeholder="Type your question here..."
                  value="{{ques}}"
                />
              </div>

              <div class="form-group">
                <button type="submit" class="btn btn-primary" id="submitButton">
                  Get Answer
                </button>
              </div>

              {% if ans %}
              <div class="answer-box">
                <label>Answer</label>
                <p>{{ ans }}</p>
              </div>
              {% endif %}
            </form>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://code.jquery.com/jquery-3.4.1.slim.min.js"
      integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
      integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"
      integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6"
      crossorigin="anonymous"
    ></script>

    <script>
      function checkOption(obj) {
        document.getElementById("para").disabled = (obj.value == "upload");
        document.getElementById("submit_btn").style.display = (obj.value == "copy") ? 'none' : 'block';
        document.getElementById("file_upload").style.display = (obj.value == "copy") ? 'none' : 'block';
      }

      function cond(obj) {
        document.getElementById('formId').action = '/' + obj.value;
      }
    </script>
  </body>
</html>
